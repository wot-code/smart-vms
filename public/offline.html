<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Smart VMS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f8fafc;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .card {
            background: white;
            border-radius: 1.5rem;
            padding: 3rem 2rem;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .icon { font-size: 4rem; margin-bottom: 1rem; }
        h1 { color: #102a43; font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #64748b; font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem; }
        .badge {
            display: inline-block;
            background: #fef3c7;
            color: #92400e;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.4rem 1rem;
            border-radius: 999px;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
        }
        .btn {
            display: inline-block;
            background: #102a43;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 0.75rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
        }
        .btn:hover { background: #0a1929; }
        .tip {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f0f9ff;
            border-radius: 0.75rem;
            font-size: 0.8rem;
            color: #0369a1;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <div class="badge">NO CONNECTION</div>
        <h1>You Are Offline</h1>
        <p>The Smart VMS requires a connection to the local network server. Please check that you are connected to the facility Wi-Fi.</p>
        <button class="btn" onclick="window.location.reload()">Try Again</button>
        <div class="tip">
            💡 <strong>Guard tip:</strong> If you submitted a form while offline, your data was saved locally and will automatically sync when the connection is restored.
        </div>
    </div>
</body>
</html>
